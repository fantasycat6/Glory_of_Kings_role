{% extends 'base.html' %}

{% block title %}添加账号 - 王者荣耀英雄统计{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">添加游戏账号</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('main.add_account') }}">
                        <div class="mb-3">
                            <label for="name" class="form-label">账号名称</label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="例如：主玩号">
                        </div>
                        <div class="mb-3">
                            <label for="loginType" class="form-label">登录方式</label>
                            <select class="form-select" id="loginType" name="loginType">
                                <option value="qq">QQ</option>
                                <option value="wechat">微信</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="platform" class="form-label">设备类型</label>
                            <select class="form-select" id="platform" name="platform">
                                <option value="android">安卓</option>
                                <option value="ios">苹果</option>
                            </select>
                        </div>
                        <div class="d-flex gap-2">
                            <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">添加账号</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
