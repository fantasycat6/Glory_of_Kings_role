{% extends 'base.html' %}

{% block title %}备份管理 - 管理后台 - 王者荣耀英雄统计{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">备份管理</h2>
    
    <!-- 英雄数据备份 -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-file-earmark-json"></i> 英雄数据备份</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted small">备份英雄列表数据，用于数据迁移或恢复英雄配置</p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" onclick="createBackup()">
                            <i class="bi bi-plus-lg"></i> 创建数据备份
                        </button>
                        <button class="btn btn-success" onclick="exportBackup()">
                            <i class="bi bi-download"></i> 导出数据备份
                        </button>
                        <button class="btn btn-info" onclick="document.getElementById('importFile').click()">
                            <i class="bi bi-upload"></i> 导入数据备份
                        </button>
                        <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importBackup(this)">
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="bi bi-database"></i> 数据库备份</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted small">备份完整数据库文件，用于网站服务迁移或整机备份</p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-dark" onclick="createDbBackup()">
                            <i class="bi bi-plus-lg"></i> 创建数据库备份
                        </button>
                        <button class="btn btn-outline-dark" onclick="document.getElementById('importDbFile').click()">
                            <i class="bi bi-upload"></i> 导入数据库备份
                        </button>
                        <input type="file" id="importDbFile" accept=".db" style="display: none;" onchange="importDbBackup(this)">
                    </div>
                    <hr>
                    <p class="text-warning small mb-0">
                        <i class="bi bi-exclamation-triangle"></i> 
                        数据库恢复会完全替换当前所有数据，请谨慎操作！
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">备份历史</h4>
        <div>
            <button class="btn btn-outline-secondary btn-sm" onclick="cleanupAutoBackups()">
                <i class="bi bi-trash"></i> 清理旧自动备份
            </button>
            <button class="btn btn-outline-primary btn-sm" onclick="scanBackups()">
                <i class="bi bi-arrow-clockwise"></i> 扫描备份文件
            </button>
        </div>
    </div>
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>文件名</th>
                            <th>大小</th>
                            <th>文件类型</th>
                            <th>备份类型</th>
                            <th>描述</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="backupTable">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 导入确认模态框 -->
<div class="modal fade" id="importModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">导入备份</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>请选择导入模式：</p>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="importMode" id="modeMerge" value="merge" checked>
                    <label class="form-check-label" for="modeMerge">
                        <strong>合并模式</strong> - 保留现有数据，添加新英雄
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="importMode" id="modeOverwrite" value="overwrite">
                    <label class="form-check-label" for="modeOverwrite">
                        <strong>覆盖模式</strong> - 清空现有数据后导入（保留用户拥有记录）
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="confirmImport()">确认导入</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let importModal;
let importData = null;

document.addEventListener('DOMContentLoaded', function() {
    importModal = new bootstrap.Modal(document.getElementById('importModal'));
    loadBackups();
});

async function loadBackups() {
    try {
        const response = await fetch('/api/admin/backup/list');
        const data = await response.json();
        
        if (data.success) {
            renderBackups(data.backups);
        }
    } catch (error) {
        console.error('Error:', error);
    }
}

async function scanBackups() {
    if (!confirm('确定要扫描备份文件夹吗？\n\n这会查找 backup 文件夹中未记录的备份文件并添加到列表中。')) return;
    
    try {
        const response = await fetch('/api/admin/backup/scan', {
            method: 'POST'
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert(data.message);
            loadBackups();
        } else {
            alert(data.error || '扫描失败');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('扫描失败，请重试');
    }
}

async function cleanupAutoBackups() {
    if (!confirm('确定要清理旧的自动备份吗？\n\n这会删除多余的自动备份，只保留最近5个。')) return;
    
    try {
        const response = await fetch('/api/admin/backup/cleanup-auto', {
            method: 'POST'
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert(data.message);
            loadBackups();
        } else {
            alert(data.error || '清理失败');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('清理失败，请重试');
    }
}

function renderBackups(backups) {
    const tbody = document.getElementById('backupTable');
    if (backups.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">暂无备份记录</td></tr>';
        return;
    }
    
    tbody.innerHTML = backups.map(backup => {
        const fileTypeBadge = backup.file_type === 'database' 
            ? '<span class="badge bg-dark">数据库</span>' 
            : '<span class="badge bg-info">数据</span>';
        
        const backupTypeBadge = backup.backup_type === 'manual' 
            ? '<span class="badge bg-primary">手动</span>' 
            : backup.backup_type === 'auto'
            ? '<span class="badge bg-secondary">自动</span>'
            : '<span class="badge bg-warning">导入</span>';
        
        // 根据文件类型显示不同的操作
        const restoreBtn = backup.file_type === 'database'
            ? `<button class="btn btn-sm btn-outline-danger" onclick="restoreDbBackup(${backup.id})">恢复</button>`
            : `<button class="btn btn-sm btn-outline-success" onclick="restoreBackup(${backup.id})">恢复</button>`;
        
        const downloadBtn = backup.file_type === 'database'
            ? `<button class="btn btn-sm btn-outline-dark" onclick="downloadDbBackup(${backup.id})">下载</button>`
            : `<button class="btn btn-sm btn-outline-primary" onclick="downloadBackup(${backup.id})">下载</button>`;
        
        return `
        <tr>
            <td>${backup.filename}</td>
            <td>${backup.file_size_formatted}</td>
            <td>${fileTypeBadge}</td>
            <td>${backupTypeBadge}</td>
            <td>${backup.description || '-'}</td>
            <td>${backup.created_at_formatted}</td>
            <td>
                ${downloadBtn}
                ${restoreBtn}
                <button class="btn btn-sm btn-outline-danger" onclick="deleteBackup(${backup.id})">删除</button>
            </td>
        </tr>
    `}).join('');
}

async function createBackup() {
    try {
        const response = await fetch('/api/admin/backup/create', {
            method: 'POST'
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('备份创建成功');
            loadBackups();
        } else {
            alert(data.error || '创建失败');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('创建失败，请重试');
    }
}

function exportBackup() {
    window.location.href = '/api/admin/backup/export';
}

function importBackup(input) {
    const file = input.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            importData = JSON.parse(e.target.result);
            importModal.show();
        } catch (error) {
            alert('文件格式错误');
        }
    };
    reader.readAsText(file);
    input.value = '';
}

async function confirmImport() {
    if (!importData) return;
    
    const mode = document.querySelector('input[name="importMode"]:checked').value;
    
    try {
        const response = await fetch('/api/admin/backup/import', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: importData, mode: mode })
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert(data.message);
            importModal.hide();
            loadBackups();
        } else {
            alert(data.error || '导入失败');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('导入失败，请重试');
    }
}

function downloadBackup(id) {
    window.location.href = `/api/admin/backup/download/${id}`;
}

async function restoreBackup(id) {
    if (!confirm('确定要从这个备份恢复数据吗？现有数据将被替换。')) return;
    
    try {
        const response = await fetch(`/api/admin/backup/restore/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mode: 'overwrite' })
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert(data.message);
        } else {
            alert(data.error || '恢复失败');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('恢复失败，请重试');
    }
}

async function deleteBackup(id) {
    if (!confirm('确定要删除这个备份吗？')) return;
    
    try {
        const response = await fetch(`/api/admin/backup/${id}`, {
            method: 'DELETE'
        });
        
        const data = await response.json();
        
        if (data.success) {
            loadBackups();
        } else {
            alert(data.error || '删除失败');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('删除失败，请重试');
    }
}

// ==================== 数据库备份操作 ====================

async function createDbBackup() {
    if (!confirm('确定要创建数据库备份吗？')) return;
    
    try {
        const response = await fetch('/api/admin/dbbackup/create', {
            method: 'POST'
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('数据库备份创建成功：' + data.filename);
            loadBackups();
        } else {
            alert(data.error || '创建失败');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('创建失败，请重试');
    }
}

async function importDbBackup(input) {
    const file = input.files[0];
    if (!file) return;
    
    if (!confirm(`确定要导入数据库备份 "${file.name}" 吗？\n\n注意：导入后需要在备份列表中手动恢复才能生效。`)) {
        input.value = '';
        return;
    }
    
    const formData = new FormData();
    formData.append('file', file);
    
    try {
        const response = await fetch('/api/admin/dbbackup/import', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('数据库备份导入成功：' + data.filename);
            loadBackups();
        } else {
            alert(data.error || '导入失败');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('导入失败，请重试');
    }
    
    input.value = '';
}

function downloadDbBackup(id) {
    window.location.href = `/api/admin/dbbackup/${id}/download`;
}

async function restoreDbBackup(id) {
    if (!confirm('警告：确定要从这个数据库备份恢复吗？\n\n当前数据库将被完全替换，所有现有数据（用户、账号、英雄等）都将被覆盖！\n\n恢复后需要重新登录系统。')) return;
    
    if (!confirm('再次确认：您真的确定要恢复数据库吗？此操作不可撤销！')) return;
    
    try {
        const response = await fetch(`/api/admin/dbbackup/${id}/restore`, {
            method: 'POST'
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert(data.message + '\n\n系统将跳转到登录页面...');
            window.location.href = '/login';
        } else {
            alert(data.error || '恢复失败');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('恢复失败，请重试');
    }
}
</script>
{% endblock %}
